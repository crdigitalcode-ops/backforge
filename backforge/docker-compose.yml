services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/backforge?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      METRICS_PORT: 9090
      ENABLE_CLUSTER: "false"
      PROCESS_TYPE: api
    command: sh -c "npx prisma db push && npm start"
    ports:
      - "3000:3000"
      - "9090:9090"

  worker:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/backforge?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PROCESS_TYPE: worker
    command: npm run start:worker

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: backforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
